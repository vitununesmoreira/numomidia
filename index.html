<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pedido Especial</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #fff7fb 0%, #ffeef6 100%);
      color: #2d1b26;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.92);
      border-radius: 28px;
      padding: 28px 22px 24px;
      box-shadow: 0 20px 60px rgba(170, 63, 116, 0.18);
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      line-height: 1.15;
    }

    .sub {
      margin: 0 0 28px;
      font-size: 1rem;
      color: #6d4a5b;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      justify-content: center;
      min-height: 210px;
      position: relative;
    }

    button {
      border: 0;
      border-radius: 18px;
      min-height: 56px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.25s ease, width 0.25s ease, opacity 0.25s ease, box-shadow 0.25s ease;
      -webkit-tap-highlight-color: transparent;
    }

    #yesBtn {
      width: 62%;
      background: linear-gradient(135deg, #ff5fa2 0%, #ff2d7a 100%);
      color: white;
      box-shadow: 0 16px 34px rgba(255, 45, 122, 0.28);
    }

    #noBtn {
      width: 48%;
      background: #fff;
      color: #c03a76;
      border: 2px solid #f3bdd1;
      box-shadow: 0 10px 24px rgba(192, 58, 118, 0.1);
      position: relative;
    }

    #yesBtn:active,
    #noBtn:active {
      transform: scale(0.98);
    }

    .message {
      margin-top: 18px;
      font-size: 1rem;
      color: #9a3565;
      min-height: 24px;
      font-weight: 600;
    }

    .result {
      display: none;
      margin-top: 14px;
      animation: fadeIn 0.5s ease;
    }

    .result.show {
      display: block;
    }

    .result h2 {
      margin: 0 0 14px;
      font-size: 1.65rem;
      color: #9b1f58;
      line-height: 1.2;
    }

    .result img {
      width: 100%;
      border-radius: 22px;
      box-shadow: 0 20px 50px rgba(155, 31, 88, 0.22);
      display: block;
    }

    .hide {
      display: none !important;
    }

    .explode {
      animation: explode 0.45s ease forwards;
      pointer-events: none;
    }

    @keyframes explode {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      45% {
        transform: scale(1.25);
        opacity: 1;
      }
      100% {
        transform: scale(0.1) rotate(18deg);
        opacity: 0;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 420px) {
      h1 {
        font-size: 1.8rem;
      }

      .card {
        padding: 24px 18px 22px;
        border-radius: 24px;
      }

      #yesBtn {
        width: 68%;
      }

      #noBtn {
        width: 54%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <section id="questionArea">
      <h1>Sabia que a gente vai se casar?</h1>
      <p class="sub">Escolha com carinho.</p>

      <div class="buttons">
        <button id="yesBtn" type="button">Sim</button>
        <button id="noBtn" type="button">Não</button>
      </div>

      <div id="message" class="message"></div>
    </section>

    <section id="result" class="result">
      <h2>Eu já sabia 💍</h2>
      <img src="https://i.pinimg.com/736x/4e/44/c0/4e44c0978bc1832370b8020a42e371aa.jpg" alt="Imagem especial do pedido" />
    </section>
  </main>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const message = document.getElementById('message');
    const result = document.getElementById('result');
    const questionArea = document.getElementById('questionArea');

    let noClicks = 0;
    let yesWidth = 62;
    let noWidth = 48;

    function applyButtonSizes() {
      yesBtn.style.width = yesWidth + '%';
      noBtn.style.width = Math.max(noWidth, 18) + '%';
      yesBtn.style.transform = 'scale(1)';
    }

    noBtn.addEventListener('click', () => {
      noClicks += 1;

      if (noClicks === 1) {
        yesWidth = 74;
        noWidth = 40;
        message.textContent = 'Pensa com carinho 😌';
        applyButtonSizes();
        return;
      }

      if (noClicks === 2) {
        yesWidth = 86;
        noWidth = 28;
        message.textContent = 'Tem certeza disso?';
        applyButtonSizes();
        return;
      }

      if (noClicks >= 3) {
        message.textContent = 'Não tem opção, escolhi por você 💍';
        noBtn.classList.add('explode');
        yesWidth = 100;
        yesBtn.style.width = '100%';
        yesBtn.style.minHeight = '62px';
        yesBtn.style.fontSize = '1.15rem';
        setTimeout(() => {
          noBtn.classList.add('hide');
        }, 420);
      }
    });

    yesBtn.addEventListener('click', () => {
      questionArea.classList.add('hide');
      result.classList.add('show');
    });

    applyButtonSizes();
  </script>
</body>
</html>
